<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- KaTeX for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
        onload="renderMathInElement(document.body, { delimiters: [{left: '$$', right: '$$'}, {left: '\\(', right: '\\)'}] });"></script>
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>

<body class="bg-white text-gray-900 min-h-screen flex flex-col transition-colors duration-200">
    {% include navigation.html %}

    <div class="max-w-4xl mx-auto px-6 py-12">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold">{{ page.title }}</h1>
            <h2 class="text-lg text-gray-600">{{ page.date | date_to_string }} - {{ page.author }}</h2>
        </div>

        {{ content }}
    </div>
</body>

</html>
